<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RL HUB</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUkwgSFVCIiwic2hvcnRfbmFtZSI6IlJMIEhVQiIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMGEwZTFhIiwidGhlbWVfY29sb3IiOiIjZmY4YzAwIn0=">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--bg2:#0f1525;--bg3:#151c30;--bg4:#1c2540;--card:#131a2e;--card-border:rgba(255,140,0,.12);--text:#e0ddd8;--text2:#8a8580;--text3:#4a4540;--accent:#ff8c00;--accent2:#ff6600;--accent-glow:rgba(255,140,0,.25);--blue:#1e90ff;--blue2:#0066cc;--glass:rgba(15,21,37,.88);--glass-border:rgba(255,255,255,.06);--green:#4caf50;--red:#f44336;--amber:#ff9800;--purple:#9c27b0;--shadow:0 4px 24px rgba(0,0,0,.6);--radius:12px;--radius-sm:8px}
[data-theme="amoled"]{--bg:#000;--bg2:#050508;--bg3:#0a0d14;--bg4:#12161e;--card:#050508;--card-border:rgba(255,140,0,.08)}
[data-theme="light"]{--bg:#e4e0db;--bg2:#ece8e3;--bg3:#f4f0eb;--bg4:#fff;--card:#fff;--card-border:rgba(0,0,0,.1);--text:#1a1a1a;--text2:#555;--text3:#999;--glass:rgba(255,255,255,.88);--glass-border:rgba(0,0,0,.06);--shadow:0 4px 24px rgba(0,0,0,.1)}
[data-accent="blue"]{--accent:#1e90ff;--accent2:#0066cc;--accent-glow:rgba(30,144,255,.25)}
[data-accent="green"]{--accent:#4caf50;--accent2:#388e3c;--accent-glow:rgba(76,175,80,.25)}
[data-accent="purple"]{--accent:#9c27b0;--accent2:#7b1fa2;--accent-glow:rgba(156,39,176,.25)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
h1,h2,h3,h4,h5{font-family:'Rajdhani',sans-serif;font-weight:700}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px}
canvas#pC{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.2}
#app{position:relative;z-index:1;max-width:600px;margin:0 auto;min-height:100vh;padding-bottom:60px}
.logo-sec{text-align:center;padding:18px 16px 4px}
.logo-wrap{position:relative;width:130px;height:130px;margin:0 auto;cursor:pointer}
.logo-svg{width:100%;height:100%}
.logo-outer{animation:rotO 20s linear infinite;transform-origin:center}
.logo-mid{animation:rotO 28s linear infinite reverse;transform-origin:center}
@keyframes rotO{to{transform:rotate(360deg)}}
.logo-ball-pulse{animation:bp 2.5s ease-in-out infinite alternate}
@keyframes bp{from{opacity:.7}to{opacity:1}}
.logo-boost{animation:bf 0.3s ease-in-out infinite alternate}
@keyframes bf{from{opacity:.5;transform:scaleX(.9)}to{opacity:.9;transform:scaleX(1.1)}}
.logo-ch{animation:ch 5s ease-in-out infinite alternate}
@keyframes ch{0%{opacity:.3}50%{opacity:.9}100%{opacity:.3}}
.crt-ov{position:absolute;inset:0;pointer-events:none;opacity:0;animation:crt 1.5s ease-out .3s forwards}
@keyframes crt{0%{opacity:1;filter:brightness(0)}10%{filter:brightness(2)}15%{filter:brightness(0)}25%{filter:brightness(1.5)}35%{filter:brightness(.2)}50%{filter:brightness(1)}100%{opacity:0}}
.brand-row{display:flex;align-items:baseline;justify-content:center;gap:4px;margin-top:5px}
.brand-rl{font-family:'Rajdhani',sans-serif;font-size:2.1rem;font-weight:700;background:linear-gradient(135deg,#ff8c00,#ff6600);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-hub{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;color:transparent;-webkit-text-stroke:1.5px var(--accent);letter-spacing:.12em}
.brand-sep{width:110px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:3px auto}
.brand-sub-row{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:2px}
.brand-sub{font-family:'Exo 2',sans-serif;font-size:.72rem;color:var(--text2);letter-spacing:.1em;text-shadow:0 0 8px var(--accent-glow)}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:dp 2s ease-in-out infinite}
@keyframes dp{0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,.6)}50%{box-shadow:0 0 0 5px rgba(76,175,80,0)}}
.hero{width:100%;height:200px;position:relative;overflow:hidden;background:var(--bg2)}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1s ease}
.hero-slide.active{opacity:1}
.hero-bg{position:absolute;top:-5%;left:-5%;width:110%;height:110%;background-size:cover;background-position:center;animation:kb 10s ease-in-out infinite alternate}
@keyframes kb{from{transform:scale(1)}to{transform:scale(1.06)}}
.hero-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.2),rgba(0,0,0,.7) 70%,rgba(10,14,26,.95))}
.hero-ct{position:relative;z-index:2;padding:10px 14px;display:flex;flex-direction:column;justify-content:flex-end;height:100%}
.hero-name{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.hero-badge{position:absolute;top:10px;right:10px;z-index:3;background:var(--accent);color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.75rem;padding:2px 8px;border-radius:4px}
.hero-arrows{position:absolute;top:50%;transform:translateY(-50%);z-index:4;width:100%;display:flex;justify-content:space-between;padding:0 8px;pointer-events:none}
.hero-arrow{pointer-events:all;background:rgba(0,0,0,.5);color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;border:none}
.hero-dots{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);z-index:4;display:flex;gap:5px}
.hero-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all .3s}
.hero-dot.active{background:var(--accent);width:18px;border-radius:4px}
.stats-bar{position:relative;z-index:3;display:flex;gap:3px;padding:7px 10px;background:var(--glass);backdrop-filter:blur(12px);border-top:1px solid var(--glass-border);overflow-x:auto}
.stat-i{display:flex;align-items:center;gap:3px;font-size:.65rem;color:var(--text2);white-space:nowrap;padding:3px 7px;background:rgba(255,255,255,.03);border-radius:5px;flex-shrink:0}
.stat-v{color:var(--accent);font-weight:600;font-family:'Rajdhani',sans-serif;font-size:.8rem}
.tab-bar{display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--glass-border);position:sticky;top:0;z-index:10;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:9px 12px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.74rem;color:var(--text3);background:none;border:none;cursor:pointer;position:relative;white-space:nowrap;transition:color .2s}
.tab-btn.active{color:var(--accent)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent)}
.tc{display:none;padding:10px;animation:fi .3s ease}
.tc.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.sw{padding:0 10px 6px;position:sticky;top:40px;z-index:9;background:var(--bg)}
.sw input{width:100%;padding:8px 14px 8px 34px;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--radius);color:var(--text);font-family:'Exo 2',sans-serif;font-size:.8rem;outline:none}
.sw input:focus{border-color:var(--accent)}
.sw .si{position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.8rem}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px;transition:transform .15s}
.card:active{transform:scale(.985)}
.card-h{position:relative;padding:10px 12px;background:var(--bg3);cursor:pointer;display:flex;align-items:center;gap:8px}
.card-h::after{content:'\25BC';margin-left:auto;font-size:.5rem;color:var(--text3);transition:transform .2s}
.card.open .card-h::after{transform:rotate(180deg)}
.card-body{display:none;padding:10px}
.card.open .card-body{display:block}
.fb{display:flex;gap:4px;margin-bottom:8px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.fb::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:4px 10px;background:var(--bg3);border:1px solid var(--glass-border);border-radius:18px;color:var(--text2);font-size:.67rem;font-family:'Exo 2',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.fbtn.active{background:var(--accent);color:#000;border-color:var(--accent)}
select.fsel{padding:4px 7px;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--radius-sm);color:var(--text);font-size:.7rem;font-family:'Exo 2',sans-serif;outline:none;flex-shrink:0}
.btn{padding:6px 13px;background:var(--accent);color:#000;border:none;border-radius:var(--radius-sm);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.btn:active{transform:scale(.96)}
.btn-o{background:transparent;border:1px solid var(--accent);color:var(--accent)}
.btn-s{padding:3px 9px;font-size:.7rem}
.btn-d{background:var(--red);color:#fff}
.stitle{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.mech-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);overflow:hidden;margin-bottom:7px}
.mech-h{padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer}
.mech-h::after{content:'\25BC';margin-left:auto;font-size:.45rem;color:var(--text3)}
.mech-card.open .mech-h::after{transform:rotate(180deg)}
.mech-diff{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.75rem;flex-shrink:0}
.mech-name{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.88rem}
.mech-cat{font-size:.58rem;color:var(--text3)}
.mech-status{font-size:.58rem;padding:1px 6px;border-radius:8px;font-weight:600;flex-shrink:0}
.mech-status.mastered{background:var(--green);color:#fff}
.mech-status.learning{background:var(--accent);color:#000}
.mech-status.next{background:var(--blue);color:#fff}
.mech-status.later{background:var(--bg4);color:var(--text3)}
.mech-body{display:none;padding:10px;border-top:1px solid var(--glass-border)}
.mech-card.open .mech-body{display:block}
.mech-desc{font-size:.75rem;color:var(--text2);margin-bottom:6px;line-height:1.4}
.mech-step{font-size:.72rem;padding:4px 6px;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:3px;border-left:2px solid var(--accent)}
.mech-tip{font-size:.7rem;color:var(--accent);padding:4px 6px;background:rgba(255,140,0,.06);border-radius:var(--radius-sm);margin-top:4px}
.mech-links{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.econ-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:10px;margin-bottom:7px}
.econ-val{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;color:var(--accent)}
.econ-lbl{font-size:.65rem;color:var(--text2);margin-bottom:1px}
.pro-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:10px;margin-bottom:6px}
.pro-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.95rem}
.pro-team{font-size:.62rem;color:var(--text3)}
.pro-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
.pro-stat{font-size:.68rem;color:var(--text2)}.pro-stat b{color:var(--text);font-weight:600}
.timer-block{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:10px;margin-bottom:6px}
.timer-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.88rem;margin-bottom:4px}
.timer-time{font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700;color:var(--accent)}
.timer-btns{display:flex;gap:4px;margin-top:4px}
.goal-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:10px;margin-bottom:6px}
.goal-bar-bg{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:4px}
.goal-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .5s}
.pack-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.pack-code{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;color:var(--accent);cursor:pointer;padding:3px 8px;background:var(--bg3);border-radius:var(--radius-sm)}
.rank-section{margin-bottom:10px}
.rank-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:8px;font-size:.65rem;font-weight:700;font-family:'Rajdhani',sans-serif}
.fun-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:12px;margin-bottom:7px;text-align:center}
.fun-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:5px}
.slot-machine{display:flex;gap:3px;justify-content:center;margin:8px 0}
.slot-reel{width:80px;height:36px;background:var(--bg3);border-radius:var(--radius-sm);overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.65rem;border:1px solid var(--glass-border)}
.bingo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;margin:6px 0}
.bingo-cell{padding:4px 2px;background:var(--bg3);border-radius:3px;font-size:.48rem;text-align:center;cursor:pointer;border:1px solid var(--glass-border);line-height:1.15;min-height:32px;display:flex;align-items:center;justify-content:center}
.bingo-cell.marked{background:var(--accent);color:#000;border-color:var(--accent)}
.tierlist-row{display:flex;align-items:stretch;margin-bottom:2px}
.tier-label{width:28px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;border-radius:3px 0 0 3px;flex-shrink:0}
.tier-items{flex:1;min-height:28px;background:var(--bg3);border-radius:0 3px 3px 0;padding:2px;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.tier-chip{padding:1px 5px;background:var(--bg4);border-radius:3px;font-size:.55rem;cursor:pointer;white-space:nowrap}
.srow{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);margin-bottom:5px}
.slbl{font-size:.8rem}.sdesc{font-size:.62rem;color:var(--text3)}
.tg{display:flex;gap:2px}
.topt{padding:3px 8px;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--radius-sm);font-size:.65rem;cursor:pointer;color:var(--text2);font-family:'Exo 2',sans-serif}
.topt.active{background:var(--accent);color:#000;border-color:var(--accent)}
.sinput{padding:4px 7px;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--radius-sm);color:var(--text);font-size:.75rem;outline:none;width:110px;font-family:'Exo 2',sans-serif}
.sinput:focus{border-color:var(--accent)}
.toast{position:fixed;bottom:65px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg4);border:1px solid var(--card-border);color:var(--text);padding:7px 16px;border-radius:var(--radius);font-size:.75rem;z-index:100;transition:transform .3s;box-shadow:var(--shadow);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.load-bar{width:80%;max-width:280px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.load-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .3s;width:0}
.chart-row{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.chart-lbl{font-size:.58rem;color:var(--text3);width:26px;text-align:right;flex-shrink:0}
.chart-bg{flex:1;height:12px;background:var(--bg3);border-radius:2px;overflow:hidden}
.chart-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px}
.chart-v{font-size:.58rem;color:var(--text2);width:36px;flex-shrink:0}
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin:6px 0}
.heat-cell{width:100%;aspect-ratio:1;border-radius:2px;background:var(--bg3)}
.confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:200}
.cosm-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:8px;margin-bottom:5px;display:flex;gap:8px;align-items:center}
.cosm-img{width:48px;height:48px;background:var(--bg3);border-radius:var(--radius-sm);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--text3)}
.cosm-info{flex:1;min-width:0}
.cosm-name{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cosm-meta{font-size:.6rem;color:var(--text3)}
.cosm-val{font-size:.68rem;color:var(--accent);font-weight:600}
.cosm-acts{display:flex;gap:4px;flex-shrink:0}
.tilt-warn{padding:10px;background:rgba(244,67,54,.1);border:1px solid var(--red);border-radius:var(--radius);margin-bottom:7px;text-align:center}
.session-entry{display:flex;gap:6px;padding:5px 6px;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:3px;font-size:.7rem;align-items:center}
@media(max-width:400px){.logo-wrap{width:100px;height:100px}.brand-rl{font-size:1.6rem}.brand-hub{font-size:1.1rem}.hero{height:155px}.tab-btn{padding:7px 9px;font-size:.68rem}}
</style>
</head>
<body data-theme="dark" data-accent="orange">
<canvas id="pC"></canvas>
<div class="loading-overlay" id="loadOv">
<div style="font-family:Rajdhani,sans-serif;font-size:1rem;color:var(--text2)" id="loadTxt">Loading RL HUB...</div>
<div class="load-bar"><div class="load-fill" id="loadBar"></div></div>
<div style="font-size:.68rem;color:var(--text3)" id="loadSub">Preparing database</div>
</div>
<div id="app" style="display:none">
<div class="logo-sec">
<div class="logo-wrap" id="logoWrap">
<svg class="logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff8c00"/><stop offset="100%" stop-color="#ff6600"/></linearGradient><clipPath id="iC"><circle cx="100" cy="100" r="50"/></clipPath></defs>
<line x1="8" y1="8" x2="28" y2="8" stroke="url(#og)" stroke-width="1.5" opacity=".6"/>
<line x1="8" y1="8" x2="8" y2="28" stroke="url(#og)" stroke-width="1.5" opacity=".6"/>
<line x1="192" y1="8" x2="172" y2="8" stroke="url(#og)" stroke-width="1.5" opacity=".6"/>
<line x1="192" y1="8" x2="192" y2="28" stroke="url(#og)" stroke-width="1.5" opacity=".6"/>
<line x1="8" y1="192" x2="28" y2="192" stroke="url(#og)" stroke-width="1.5" opacity=".6"/>
<line x1="8" y1="192" x2="8" y2="172" stroke="url(#og)" stroke-width="1.5" opacity=".6"/>
<line x1="192" y1="192" x2="172" y2="192" stroke="url(#og)" stroke-width="1.5" opacity=".6"/>
<line x1="192" y1="192" x2="192" y2="172" stroke="url(#og)" stroke-width="1.5" opacity=".6"/>

function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"k";return String(n);}

function spin(){var names=[];for(var i=0;i<MECHS.length;i++)names.push(MECHS[i].n);var reels=[document.getElementById("sl1"),document.getElementById("sl2"),document.getElementById("sl3")];var c=0;var iv=setInterval(function(){for(var r=0;r<3;r++)reels[r].textContent=names[Math.floor(Math.random()*names.length)].substring(0,12);c++;if(c>15){clearInterval(iv);var pick=names[Math.floor(Math.random()*names.length)];var parts=pick.split(" ");reels[0].textContent=parts[0]||"";reels[1].textContent=parts[1]||"";reels[2].textContent=parts.slice(2).join(" ")||"!";playGoal();toast("Practice: "+pick);}},100);}
function seededRng(seed){return function(){seed=(seed*16807+0)%2147483647;return(seed-1)/2147483646;};}
function getBingoRank(){return S.bingoRank||S.settings.rank||"Gold";}
function todayStr(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function getDailyBingo(){
var rank=getBingoRank();var pool=BINGO_POOLS[rank];if(!pool||!pool.length)pool=BINGO_POOLS["Gold"];
var ds=todayStr();if(S.bingoDate!==ds){S.bingoDate=ds;S.bingoState=[];for(var x=0;x<25;x++)S.bingoState.push(false);S.bingoState[12]=true;save();}
var seedNum=0;for(var c=0;c<ds.length;c++)seedNum=seedNum*31+ds.charCodeAt(c);
seedNum=seedNum+(rank.length*997);
var rng=seededRng(Math.abs(seedNum)||1);
var indices=[];for(var i=0;i<pool.length;i++)indices.push(i);
for(var j=indices.length-1;j>0;j--){var k=Math.floor(rng()*j);var tmp=indices[j];indices[j]=indices[k];indices[k]=tmp;}
var card=[];for(var p=0;p<24;p++)card.push(pool[indices[p%indices.length]]);
card.splice(12,0,"FREE SPACE");
return card;}
